name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: avd
          POSTGRES_USER: avd
          POSTGRES_PASSWORD: avd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U avd -d avd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "ci-only"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgis://avd:avd@localhost:5432/avd"
      REDIS_URL: "redis://localhost:6379/0"
      CELERY_BROKER_URL: "redis://localhost:6379/1"
      CELERY_RESULT_BACKEND: "redis://localhost:6379/2"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System deps (GeoDjango)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev proj-bin libproj-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          python src/manage.py migrate --noinput

      - name: Run tests
        run: |
          pytest

