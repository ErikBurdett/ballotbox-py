services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: avd
      POSTGRES_USER: avd
      POSTGRES_PASSWORD: avd
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  web:
    build: .
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-unsafe-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: ${DATABASE_URL:-postgis://avd:avd@db:5432/avd}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    command: ["bash", "/app/scripts/start-web.sh"]

  worker:
    build: .
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-unsafe-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: ${DATABASE_URL:-postgis://avd:avd@db:5432/avd}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    command: ["bash", "/app/scripts/start-worker.sh"]

  beat:
    build: .
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-unsafe-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: ${DATABASE_URL:-postgis://avd:avd@db:5432/avd}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    command: ["bash", "/app/scripts/start-beat.sh"]

  assets:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    restart: unless-stopped
    command: ["sh", "-lc", "npm install && npm run dev"]

volumes:
  db_data:
